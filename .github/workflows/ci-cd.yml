name: Deploy to Local VM

on:
  push:
    branches:
      - main  # ou le nom de ta branche

jobs:
  deploy:
    runs-on: self-hosted  # <--- TRES IMPORTANT : C'est ce qui appelle ta VM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Run with Docker
        run: |
          # 1. On arrête le projet proprement
          docker compose down --remove-orphans

          # 2. NETTOYAGE FORCE : On supprime tous les conteneurs qui pourraient bloquer
          # On ignore les erreurs si les conteneurs n'existent pas (|| true)
          docker rm -f parc_db parc_backend parc_frontend || true

          # 3. On relance tout à neuf
          docker compose up -d --build
